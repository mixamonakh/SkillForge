name: ${COMPOSE_PROJECT_NAME:-skillforge}

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillforge}
      POSTGRES_DB: ${POSTGRES_DB:-skillforge}
    volumes:
      - skillforge_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready --username="$${POSTGRES_USER}" --dbname="$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    stop_grace_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-skillforge}:${POSTGRES_PASSWORD:-skillforge}@db:5432/${POSTGRES_DB:-skillforge}?schema=public
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEFAULT_USER_NAME: ${DEFAULT_USER_NAME:-Михаил}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ru}
      SEED_CONTENT_PACK: ${SEED_CONTENT_PACK:-js-baseline-v1}
      AI_MODE: ${AI_MODE:-manual}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MONTHLY_BUDGET_USD: ${AI_MONTHLY_BUDGET_USD:-0}
      IMPORT_MAX_BYTES: ${IMPORT_MAX_BYTES:-5242880}
      CODE_RUNNER_TIMEOUT_MS: ${CODE_RUNNER_TIMEOUT_MS:-2000}
      RESUME_THRESHOLD_DAYS: ${RESUME_THRESHOLD_DAYS:-7}
      SENTRY_DSN: ${SENTRY_DSN:-}
    entrypoint: ['/app/scripts/docker-entrypoint-api.sh']
    command: ['node', 'apps/api/dist/main.js']
    ports:
      - '127.0.0.1:${API_PORT:-4000}:4000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/v1/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    stop_grace_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_INTERNAL_URL: http://api:4000
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_PATH: /api/v1
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '127.0.0.1:${WEB_PORT:-3000}:3000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 20s

volumes:
  skillforge_postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-skillforge_postgres_data}
